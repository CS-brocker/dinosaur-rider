name: Sync 창환 Study Files to PigLibrary

on:
  push:
    paths:
      - '*주차/창환/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.actor == '2chang5' || github.actor == 'android-changhwan'

    steps:
      - name: Checkout dinosaur-rider
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find changed files and resolve chapter
        id: find
        run: |
          # 변경된 파일 중 n주차/창환/ 하위 .md 파일 추출
          git diff --name-only HEAD~1 HEAD \
            | grep -E '^[0-9]+주차/창환/.*\.md$' \
            > /tmp/changed_files.txt || true

          echo "=== Changed files ==="
          cat /tmp/changed_files.txt

          # 변경된 파일이 속한 주차별로 장 정보를 매핑
          # 형식: "n장|파일경로"
          > /tmp/chapter_files.txt
          while IFS= read -r file; do
            [ -z "$file" ] && continue

            week_dir=$(echo "$file" | grep -oE '^[0-9]+주차')
            chapter=$(ls "${week_dir}/창환/" | grep -oE '^[0-9]+장' | head -1)

            if [ -z "$chapter" ]; then
              echo "::error::🚨 ${week_dir}/창환/ 폴더에 n장 파일이 없습니다. ($file 처리 중) 🚨"
              exit 1
            fi

            echo "${chapter}|${file}" >> /tmp/chapter_files.txt
          done < /tmp/changed_files.txt

          echo "=== Chapter mapping ==="
          cat /tmp/chapter_files.txt

          if [ -s /tmp/chapter_files.txt ]; then
            echo "has_files=true" >> $GITHUB_OUTPUT
          else
            echo "has_files=false" >> $GITHUB_OUTPUT
          fi

      - name: Clone PigLibrary
        if: steps.find.outputs.has_files == 'true'
        env:
          PAT: ${{ secrets.CHANG_HWAN_PAT }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/Exodia-Pig/PigLibrary.git /tmp/piglibrary

      - name: Copy files to PigLibrary
        if: steps.find.outputs.has_files == 'true'
        run: |
          while IFS= read -r line; do
            [ -z "$line" ] && continue

            chapter=$(echo "$line" | cut -d'|' -f1)
            file=$(echo "$line" | cut -d'|' -f2)
            filename=$(basename "$file")

            dest_dir="/tmp/piglibrary/운영체제(공룡책)/${chapter}"
            mkdir -p "$dest_dir"
            cp "$file" "$dest_dir/$filename"
            echo "Copied: $file -> $dest_dir/$filename"
          done < /tmp/chapter_files.txt

      - name: Commit and push to PigLibrary
        id: commit
        if: steps.find.outputs.has_files == 'true'
        env:
          PAT: ${{ secrets.CHANG_HWAN_PAT }}
        run: |
          cd /tmp/piglibrary

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          if git diff --staged --quiet; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            chapters=$(cut -d'|' -f1 /tmp/chapter_files.txt | sort -u | tr '\n' ' ' | sed 's/ $//')
            git commit -m "📚 Sync study notes from dinosaur-rider (${chapters})"
            git push
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        if: always()
        run: |
          echo "=============================="
          echo "         동기화 결과 요약"
          echo "=============================="

          if [ "${{ steps.find.outcome }}" = "failure" ]; then
            echo "❌ 실패: n장 파일을 찾지 못했습니다."
            echo "   원인: 변경된 파일이 속한 주차 폴더에 n장으로 시작하는 파일이 없습니다."
            exit 0
          fi

          if [ "${{ steps.find.outputs.has_files }}" = "false" ]; then
            echo "ℹ️ 생략: 동기화할 파일이 없습니다."
            echo "   원인: n주차/창환/ 하위에 변경된 .md 파일이 없습니다."
            exit 0
          fi

          echo ""
          echo "📋 복사된 파일 목록:"
          while IFS= read -r line; do
            chapter=$(echo "$line" | cut -d'|' -f1)
            file=$(echo "$line" | cut -d'|' -f2)
            filename=$(basename "$file")
            echo "  ✅ $filename → 운영체제(공룡책)/${chapter}/${filename}"
          done < /tmp/chapter_files.txt

          echo ""
          if [ "${{ steps.commit.outputs.no_changes }}" = "true" ]; then
            echo "ℹ️ 생략: PigLibrary에 이미 동일한 내용이 존재합니다. push 생략."
          else
            chapters=$(cut -d'|' -f1 /tmp/chapter_files.txt | sort -u | tr '\n' ' ' | sed 's/ $//')
            echo "🚀 완료: PigLibrary에 push 성공 (${chapters})"
          fi
          echo "=============================="
